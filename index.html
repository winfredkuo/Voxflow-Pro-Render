<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot redefine property: isZerion" error caused by Zerion extension
      (function() {
        try {
          if (!('isZerion' in window)) {
            Object.defineProperty(window, 'isZerion', {
              value: false,
              configurable: true,
              writable: true
            });
          }
        } catch (e) {
          console.warn('Zerion guard skipped:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
